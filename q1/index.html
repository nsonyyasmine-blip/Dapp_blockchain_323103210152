<!DOCTYPE html>
<html>
<head>
    <title>Document Verification DApp</title>
    <script src="https://cdn.jsdelivr.net/npm/web3/dist/web3.min.js"></script>
</head>

<body>

<body style="margin:0; font-family: Arial;">

<div style="
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
">

    <h1>Document Verification</h1>

    <input type="text" id="hash" placeholder="Enter document hash"
        style="padding:10px; width:300px; margin:15px; font-size:16px;">

    <div>
        <button onclick="store()" 
            style="padding:10px 20px; margin-right:10px; font-size:16px;">
            Store Document
        </button>

        <button onclick="verify()" 
            style="padding:10px 20px; font-size:16px;">
            Verify Document
        </button>
    </div>

</div>

<script>
let web3;
let contract;

//  PASTE YOUR DETAILS HERE
const contractAddress = "0x857D0835353Ea5361877897af1620B9639c98361";
const contractABI =[
	{
		"inputs": [
			{
				"internalType": "string",
				"name": "hash",
				"type": "string"
			}
		],
		"name": "addDocument",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "string",
				"name": "",
				"type": "string"
			}
		],
		"name": "documents",
		"outputs": [
			{
				"internalType": "bool",
				"name": "",
				"type": "bool"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "string",
				"name": "hash",
				"type": "string"
			}
		],
		"name": "verifyDocument",
		"outputs": [
			{
				"internalType": "bool",
				"name": "",
				"type": "bool"
			}
		],
		"stateMutability": "view",
		"type": "function"
	}
] ;

//  Connect MetaMask
async function connect() {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        await window.ethereum.request({ method: 'eth_requestAccounts' });

        contract = new web3.eth.Contract(contractABI, contractAddress);

        console.log("Connected to blockchain");
    } else {
        alert("Please install MetaMask");
    }
}

connect();

//  Store Document
async function store() {
    const hash = document.getElementById("hash").value;
    const accounts = await web3.eth.getAccounts();

    await contract.methods.addDocument(hash).send({
        from: accounts[0]
    });

    alert(" Stored Successfully");
}

//  Verify Document
async function verify() {
    const hash = document.getElementById("hash").value;

    const result = await contract.methods.verifyDocument(hash).call();

    if (result) {
        alert(" Document is VALID");
    } else {
        alert(" Document is NOT VALID");
    }
}
</script>

</body>
</html>
